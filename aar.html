<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JW Player — HLS Proxy Player with Audio Boost</title>
  <script src="https://ssl.p.jwpcdn.com/player/v/8.32.0/jwplayer.js"></script>
  <!-- Load hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    #player {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    /* Custom player styles */
    .jw-title-primary {
      font-weight: bold;
      font-size: 1.5em;
      color: #ff6347 !important;
    }
    .jwplayer .jw-progress {
      background-color: #06b6d4 !important;
    }
    .jwplayer .jw-text-time {
      color: #ff6347 !important;
    }
    .jwplayer .jw-button:hover {
      background: #ff6347 !important;
    }
    .jw-rightclick .jw-reset {
      display: none;
    }
    /* Audio Boost Button Badge */
    #audio-boost-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 9999;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #ff6347;
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      transition: all 0.2s ease;
    }
    #audio-boost-btn:hover {
      background: #ff6347;
      color: #000;
    }
    #audio-boost-btn.boost-active {
      background: #06b6d4;
      border-color: #06b6d4;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <button id="audio-boost-btn" title="Click to boost audio volume beyond 100%">🔊 Audio Boost: 1x (Normal)</button>

  <script>
    var jwp = jwplayer('player');
    var pageUrl = window.location.href;
    var playbackKey = `jwplayer-playback-position-${pageUrl}`;
    
    // Load saved position from localStorage
    var savedPosition = localStorage.getItem(playbackKey);

    jwp.setup({
      aspectratio: "16:9",
      width: "100%",
      height: "100%",
      sources: [{
        file: "https://dry-snowflake-a13b.vinodyadavpothabattula666.workers.dev/ana",
        type: "hls",
        default: true
      }],
      image: "",
      primary: "html5", // ✅ Ensures iPhone uses native playback
      preload: "auto",
      title: "",
      bufferLength: 5,
      hlshtml: true,    // ✅ Enable HTML5 HLS fallback
      html5: {
        hlsjsConfig: {  // Optional HLS.js tuning
          xhrSetup: function(xhr, url) {
            xhr.setRequestHeader("Accept", "*/*");
          },
          liveSyncDuration: 3,
          maxBufferLength: 30,
          manifestLoadingMaxRetry: 4,
          fragLoadingMaxRetry: 4
        }
      },
      abr: {
        enabled: true
      },
      cast: {
        enabled: true
      },
      controls: true,
      displayPlaybackLabel: false,
      liveTimeout: 2,
      dvrSeekLimit: 60,
      dvrWindow: 3600,
      logo: {
        file: "",
        position: "top-right",
        margin: 10,
        link: "",
        hide: false,
        width: 100,
        height: 50
      },
      tracks: [{
        file: "",
        label: "English",
        kind: "captions",
        "default": true,
        language: "en"
      }]
    });

    jwp.on('ready', function () {
      // Seek to the saved position if available
      if (savedPosition && !isNaN(savedPosition)) {
        jwp.seek(parseFloat(savedPosition));
      }

      const playerContainer = document.querySelector('#player');
      
      // Display icon 10s forward
      const rewindContainer = playerContainer.querySelector('.jw-display-icon-rewind');
      if (rewindContainer) {
        const forwardContainer = rewindContainer.cloneNode(true);
        const forwardDisplayButton = forwardContainer.querySelector('.jw-icon-rewind');
        if (forwardDisplayButton) {
          forwardDisplayButton.style.transform = "scaleX(-1)";
          forwardDisplayButton.ariaLabel = "Forward 10 Seconds";
          const nextContainer = playerContainer.querySelector('.jw-display-icon-next');
          if (nextContainer && nextContainer.parentNode) {
            nextContainer.parentNode.insertBefore(forwardContainer, nextContainer);
            nextContainer.style.display = 'none'; // Hide next button
          }
        }
        
        // Control bar icon 10s forward
        const buttonContainer = playerContainer.querySelector('.jw-button-container');
        if (buttonContainer) {
          const rewindControlBarButton = buttonContainer.querySelector(".jw-icon-rewind");
          if (rewindControlBarButton) {
            const forwardControlBarButton = rewindControlBarButton.cloneNode(true);
            forwardControlBarButton.style.transform = "scaleX(-1)";
            forwardControlBarButton.ariaLabel = "Forward 10 Seconds";
            if (rewindControlBarButton.parentNode) {
              rewindControlBarButton.parentNode.insertBefore(forwardControlBarButton, rewindControlBarButton.nextElementSibling);
            }
            
            // Add onclick handlers
            [forwardContainer.querySelector('.jw-icon-rewind'), forwardControlBarButton].forEach(button => {
              if (button) {
                button.onclick = () => {
                  jwp.seek(jwp.getPosition() + 10);
                };
              }
            });
          }
        }
      }
      
      // Initialize Web Audio API Volume Booster
      initWebAudioBooster();
    });

    // Save playback position
    jwp.on('time', function (event) {
      if (event && event.position) {
        localStorage.setItem(playbackKey, event.position);
      }
    });

    // Clear position when complete
    jwp.on('complete', function () {
      localStorage.removeItem(playbackKey);
    });

    // --- Web Audio API Software Volume Booster (Fixes JWPlayer low volume) ---
    var audioCtx = null;
    var gainNode = null;
    var sourceNode = null;
    var boostMultiplier = 1.0;
    const boostLevels = [1.0, 1.5, 2.0, 3.0]; // 1x, 1.5x (+3.5dB), 2x (+6dB), 3x (+9.5dB)
    let currentBoostIdx = 0;

    function initWebAudioBooster() {
      const boostBtn = document.getElementById('audio-boost-btn');
      
      boostBtn.addEventListener('click', function() {
        const videoElement = document.querySelector('#player video');
        if (!videoElement) {
          console.warn("Video element not ready yet.");
          return;
        }

        // Initialize AudioContext on first user click (browsers require gesture)
        if (!audioCtx) {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            sourceNode = audioCtx.createMediaElementSource(videoElement);
            gainNode = audioCtx.createGain();
            
            // Route: Video -> GainNode -> Speakers
            sourceNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
          } catch (err) {
            console.error("Web Audio API not supported or CORS blocked media element source:", err);
            alert("Audio boost not available in this browser configuration.");
            return;
          }
        }

        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        // Cycle through boost levels
        currentBoostIdx = (currentBoostIdx + 1) % boostLevels.length;
        boostMultiplier = boostLevels[currentBoostIdx];
        gainNode.gain.value = boostMultiplier;

        if (boostMultiplier > 1.0) {
          boostBtn.textContent = `🔊 Audio Boost: ${boostMultiplier}x (+${Math.round(20 * Math.log10(boostMultiplier))} dB)`;
          boostBtn.classList.add('boost-active');
        } else {
          boostBtn.textContent = `🔊 Audio Boost: 1x (Normal)`;
          boostBtn.classList.remove('boost-active');
        }
      });
    }

    // --- hls.js / Safari fallback ---
    function initHlsFunction() {
      if (typeof Hls !== "undefined") {
        if (Hls.isSupported()) {
          console.log("✅ hls.js is supported and running.");
        } else {
          console.log("ℹ️ Falling back to native HLS (Safari / iPhone).");
        }
      } else {
        console.log("⚠️ hls.js not loaded, relying on JWPlayer native handling.");
      }
    }
    initHlsFunction();
  </script>
</body>
</html>
