<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://ssl.p.jwpcdn.com/player/v/8.32.0/jwplayer.js"></script>
  <!-- Load hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    #player {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    
    /* Custom player styles */
    .jw-title-primary {
      font-weight: bold;
      font-size: 1.5em;
      color: #ff6347 !important;
    }
    
    .jwplayer .jw-progress {
      background-color: #06b6d4 !important;
    }
    
    .jwplayer .jw-text-time {
      color: #ff6347 !important;
    }
    
    .jwplayer .jw-button:hover {
      background: #ff6347 !important;
    }
    
    .jw-rightclick .jw-reset {
      display: none;
    }

    /* Toast notification for screen mode */
    #mode-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0, 0, 0, 0.85);
      color: #ff6347;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      z-index: 99999999;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      border: 1px solid #ff6347;
      box-shadow: 0 4px 12px rgba(255, 99, 71, 0.3);
    }

    #mode-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="mode-toast">Mode: Fit (Aspect)</div>
  
  <script>
    var jwp = jwplayer('player');
    var pageUrl = window.location.href;
    var playbackKey = `jwplayer-playback-position-${pageUrl}`;
    
    // Load saved position from localStorage
    var savedPosition = localStorage.getItem(playbackKey);
    jwp.setup({
      aspectratio: "16:9",
      width: "100%",
      height: "100%",
      sources: [{
        file: "https://pothabattulavinod.github.io/pay/varsham.m3u8", // Master Playlist
        type: "hls",
        default: true
      }],
      image: "",
      primary: "html5",   // Ensures iPhone uses native playback
      preload: "auto",
      title: "",
      bufferLength: 5,
      hlshtml: true,      // Enable HTML5 HLS fallback
      html5: {
        hlsjsConfig: {
          liveSyncDuration: 3,
          maxBufferLength: 30
        }
      },
      abr: {
        enabled: true     // Allow adaptive bitrate switching
      },
      cast: {
        enabled: true
      },
      controls: true,
      displayPlaybackLabel: false,
      liveTimeout: 2,
      dvrSeekLimit: 60,
      dvrWindow: 3600,
      logo: {
        file: "",
        position: "top-right",
        margin: 10,
        link: "",
        hide: false,
        width: 100,
        height: 50
      },
      tracks: [{
        file: "",
        label: "English",
        kind: "captions",
        "default": true,
        language: "en"
      }]
    });
    
    // Toast helper
    function showToast(text) {
      const toast = document.getElementById('mode-toast');
      toast.innerText = text;
      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Ratio and fitting modes list to cycle through on touch
    const cycleModes = [
      { type: 'stretching', value: 'uniform', label: 'Fit (Aspect)' },
      { type: 'stretching', value: 'fill', label: 'Fill / Zoom (Large)' },
      { type: 'stretching', value: 'exactfit', label: 'Stretch (Full)' },
      { type: 'stretching', value: 'none', label: 'Original (1:1)' },
      { type: 'aspect', value: '16:9', label: 'Aspect: 16:9 Widescreen' },
      { type: 'aspect', value: '21:9', label: 'Aspect: 21:9 Ultrawide' },
      { type: 'aspect', value: '4:3', label: 'Aspect: 4:3 Standard' }
    ];
    let currentModeIndex = 0;

    jwp.on('ready', function () {
      // Seek to the saved position if available
      if (savedPosition && !isNaN(savedPosition)) {
        jwp.seek(parseFloat(savedPosition));
      }
    
      const playerContainer = document.querySelector('#player');
    
      // --- Add Forward 10s button ---
      const rewindContainer = playerContainer.querySelector('.jw-display-icon-rewind');
      if (rewindContainer) {
        const forwardContainer = rewindContainer.cloneNode(true);
        const forwardDisplayButton = forwardContainer.querySelector('.jw-icon-rewind');
        forwardDisplayButton.style.transform = "scaleX(-1)";
        forwardDisplayButton.ariaLabel = "Forward 10 Seconds";
        const nextContainer = playerContainer.querySelector('.jw-display-icon-next');
        if (nextContainer && nextContainer.parentNode) {
          nextContainer.parentNode.insertBefore(forwardContainer, nextContainer);
        }

        // Control bar icon for forward
        playerContainer.querySelector('.jw-display-icon-next').style.display = 'none'; // Hide next button
        const buttonContainer = playerContainer.querySelector('.jw-button-container');
        if (buttonContainer) {
          const rewindControlBarButton = buttonContainer.querySelector(".jw-icon-rewind");
          if (rewindControlBarButton) {
            const forwardControlBarButton = rewindControlBarButton.cloneNode(true);
            forwardControlBarButton.style.transform = "scaleX(-1)";
            forwardControlBarButton.ariaLabel = "Forward 10 Seconds";
            rewindControlBarButton.parentNode.insertBefore(forwardControlBarButton, rewindControlBarButton.nextElementSibling);

            // Add onclick handlers for forward buttons
            [forwardDisplayButton, forwardControlBarButton].forEach(button => {
              button.onclick = () => {
                jwp.seek(jwp.getPosition() + 10);
              };
            });
          }
        }
      }

      // --- Add Cycle Ratio Button with Exact Native Button Sizing & Placement ---
      const buttonContainer = playerContainer.querySelector('.jw-button-container');
      if (buttonContainer) {
        const referenceButton = buttonContainer.querySelector('.jw-icon-rewind') || buttonContainer.querySelector('.jw-button');
        if (referenceButton) {
          const ratioControlBarButton = referenceButton.cloneNode(true);
          ratioControlBarButton.id = 'custom-ratio-btn';
          ratioControlBarButton.removeAttribute('style');
          ratioControlBarButton.setAttribute('aria-label', 'Change Screen Ratio & Fit');
          ratioControlBarButton.title = 'Touch to Change Ratio & Fit';
          
          // Inject perfectly sized icon matching native control buttons
          ratioControlBarButton.innerHTML = '<div class="jw-icon jw-icon-inline" style="display:flex; align-items:center; justify-content:center; width:100%; height:100%;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" style="fill:currentColor; display:block;"><path d="M3 5h18v14H3V5zm2 2v10h14V7H5zm3 2h8v6H8V9z"/></svg></div>';

          // Insert before fullscreen button or append
          const fsButton = buttonContainer.querySelector('.jw-icon-fullscreen') || buttonContainer.querySelector('.jw-button:last-child');
          if (fsButton && fsButton.parentNode) {
            fsButton.parentNode.insertBefore(ratioControlBarButton, fsButton);
          } else {
            buttonContainer.appendChild(ratioControlBarButton);
          }

          // Cycle on click/touch logic
          ratioControlBarButton.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();

            // Move to next mode
            currentModeIndex = (currentModeIndex + 1) % cycleModes.length;
            const mode = cycleModes[currentModeIndex];

            if (mode.type === 'stretching') {
              jwp.setConfig({ stretching: mode.value });
            } else if (mode.type === 'aspect') {
              jwp.setConfig({ width: '100%', aspectratio: mode.value });
            }

            showToast(mode.label);
          });
        }
      }
    });
    
    // Save playback position
    jwp.on('time', function (event) {
      localStorage.setItem(playbackKey, event.position);
    });
    
    // Clear position when complete
    jwp.on('complete', function () {
      localStorage.removeItem(playbackKey);
    });
    
    // --- hls.js / Safari fallback ---
    function initHlsFunction() {
      if (typeof Hls !== "undefined") {
        if (Hls.isSupported()) {
          console.log("✅ hls.js is supported and running.");
        } else {
          console.log("ℹ️ Falling back to native HLS (Safari / iPhone).");
        }
      } else {
        console.log("⚠️ hls.js not loaded, relying on JWPlayer native handling.");
      }
    }
    initHlsFunction();
  </script>
</body>
</html>
